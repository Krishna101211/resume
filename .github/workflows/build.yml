name: Build Resume PDFs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find and compile all .tex files
        run: |
          for tex in $(find . -name '*.tex' -not -path './.git/*'); do
            dir=$(dirname "$tex")
            base=$(basename "$tex" .tex)
            echo "Compiling: $tex"
            cd "$dir"
            pdflatex -interaction=nonstopmode -file-line-error "$base.tex" > /dev/null 2>&1
            pdflatex -interaction=nonstopmode -file-line-error "$base.tex" > /dev/null 2>&1
            cd - > /dev/null
          done

      - name: Commit PDFs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add '*.pdf'
          git add '**/*.pdf'
          git commit -m "Update PDFs" || echo "No changes"
          git push
