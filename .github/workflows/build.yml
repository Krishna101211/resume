name: Build Resume PDFs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.find.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: find
        run: |
          CHANGED=$(git diff --name-only HEAD^ HEAD -- '*.tex' 2>/dev/null || find . -name '*.tex' -not -path './.git/*' | sed 's|^\./||')
          if [ -z "$CHANGED" ]; then
            echo "files=[]" >> "$GITHUB_OUTPUT"
          else
            FILES=$(echo "$CHANGED" | jq -R . | jq -sc .)
            echo "files=${FILES}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    runs-on: ubuntu-latest
    if: needs.discover.outputs.files != '[]'
    strategy:
      matrix:
        file: ${{ fromJson(needs.discover.outputs.files) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile ${{ matrix.file }}
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ matrix.file }}

      - name: Commit PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add '*.pdf'
          git commit -m "Update PDF for ${{ matrix.file }}" || echo "No changes"
          git push
