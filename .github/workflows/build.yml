name: Build Resume PDFs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.find.outputs.files }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          FILES=$(find . -name '*.tex' -not -path './.git/*' | sed 's|^\./||' | jq -R . | jq -s .)
          echo "files=$FILES" >> $GITHUB_OUTPUT

  build:
    needs: discover
    runs-on: ubuntu-latest
    if: needs.discover.outputs.files != '[]'
    strategy:
      matrix:
        file: ${{ fromJson(needs.discover.outputs.files) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile ${{ matrix.file }}
        uses: xu-cheng/latex-action@v3
        with:
          root_file: ${{ matrix.file }}

      - name: Commit PDFs
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add '*.pdf'
          git commit -m "Update PDF" || echo "No changes"
          git push
